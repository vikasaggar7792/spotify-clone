<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>

    <div class="container flex bg-black">

        <!-- LEFT SIDEBAR -->
        <div class="left">

            <div class="close">
                <img width="30" class="invert" src="img/close.svg" alt="close">
            </div>

            <div class="home bg-grey rounded m-1 p-1">
                <div class="logo">
                    <img width="110" class="invert" src="img/logo.svg" alt="logo">
                </div>

                <ul>
                    <li><img class="invert" src="img/home.svg" alt=""> Home</li>
                    <li><img class="invert" src="img/search.svg" alt=""> Search</li>
                </ul>
            </div>

            <div class="library bg-grey rounded m-1 p-1">

                <div class="heading">
                    <img class="invert" src="img/playlist.svg" alt="">
                    <h2>Your Library</h2>
                </div>

                <div class="songList">
                    <ul></ul>
                </div>

                <div class="footer">
                    <div><a href="#"><span>Legal</span></a></div>
                    <div><a href="#"><span>Privacy Center</span></a></div>
                    <div><a href="#"><span>Privacy Policy</span></a></div>
                    <div><a href="#"><span>Cookies</span></a></div>
                    <div><a href="#"><span>About Ads</span></a></div>
                    <div><a href="#"><span>Accessibility</span></a></div>
                </div>

            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right bg-grey rounded">

            <!-- HEADER -->
            <div class="header">

                <div class="nav">
                    <div class="hamburgerContainer">

                        <img width="40" class="invert hamburger" src="img/hamburger.svg" alt="menu">

                        <!-- LEFT ARROW -->
                        <svg width="24" height="24" viewBox="0 0 24 24">
                            <path d="M15 6L9 12L15 18" stroke="white" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                        <!-- RIGHT ARROW -->
                        <svg width="24" height="24" viewBox="0 0 24 24">
                            <path d="M9 6L15 12L9 18" stroke="white" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                    </div>
                </div>

                <div class="buttons">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>

            </div>

            <!-- PLAYLIST SECTION -->
        <div class="spotifyPlaylists">
                <h1>Spotify Playlists</h1>

            <div class="cardContainer">
                <div class="card">
                    <img src="https://i.ytimg.com/vi/rHdS6g5XabA/maxresdefault.jpg" alt="">
                    <h2>Happy Hits|</h2>
                    <p>Hits to boost your nood and fill you with happinessl</p>
                </div>
            </div>
        </div>

                <!-- PLAYBAR -->
                <div class="playbar">

                    <div class="seekbar">
                        <div class="circle"></div>
                    </div>

                    <div class="abovebar">

                        <div class="songinfo"></div>

                        <div class="songbuttons">
                            <img width="35" id="previous" src="img/prevsong.svg" alt="">
                            <img width="35" id="play" src="img/play.svg" alt="">
                            <img width="35" id="next" src="img/nextsong.svg" alt="">
                        </div>

                        <div class="timevol">

                            <div class="songtime"></div>

                            <div class="volume">
                                <img width="25" src="img/volume.svg" alt="">
                                <div class="range">
                                    <input type="range" name="volume">
                                </div>
                            </div>

                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
